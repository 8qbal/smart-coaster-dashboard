<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💧 Smart Coaster Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="logo">💧</span>
                <h1>Smart Coaster Dashboard</h1>
            </div>
            <div class="header-right">
                <div class="status-indicator" id="connection-status">
                    <span class="status-dot offline"></span>
                    <span class="status-text">Offline</span>
                </div>
                <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
                    🌙
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Sensor Cards -->
            <section class="sensor-cards">
                <div class="card temperature-card">
                    <div class="card-icon">🌡️</div>
                    <div class="card-content">
                        <span class="card-value" id="temp-value">--</span>
                        <span class="card-unit">°C</span>
                    </div>
                    <div class="card-label">Temperature</div>
                </div>

                <div class="card humidity-card">
                    <div class="card-icon">💧</div>
                    <div class="card-content">
                        <span class="card-value" id="humidity-value">--</span>
                        <span class="card-unit">%</span>
                    </div>
                    <div class="card-label">Humidity</div>
                </div>

                <div class="card distance-card">
                    <div class="card-icon">📏</div>
                    <div class="card-content">
                        <span class="card-value" id="distance-value">--</span>
                        <span class="card-unit">cm</span>
                    </div>
                    <div class="card-label">Distance</div>
                </div>

                <div class="card bottle-card">
                    <div class="card-icon" id="bottle-icon">🍶</div>
                    <div class="card-content">
                        <span class="card-value" id="bottle-value">--</span>
                    </div>
                    <div class="card-label">Bottle Status</div>
                </div>
            </section>



            <!-- Charts Section -->
            <section class="charts-section">
                <div class="chart-container">
                    <h3>📈 Temperature & Humidity Trend (Last 1 Hour)</h3>
                    <canvas id="trendChart"></canvas>
                </div>
            </section>

            <!-- Last Updated -->
            <section class="last-updated-section">
                <p>Last updated: <span id="last-updated">Never</span></p>
            </section>
        </main>

    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
